# Gradle build properties
# Do NOT commit secrets here — use ~/.gradle/gradle.properties instead.

android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true

# Uncomment and fill in to enable the debug Mapbox token fallback in the app:
# MAPBOX_ACCESS_TOKEN=pk.your_public_token_here

# Required to download the Mapbox Navigation SDK during build:
# MAPBOX_DOWNLOADS_TOKEN=sk.your_secret_downloads_token_here
